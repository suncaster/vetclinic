{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 500px; margin: 50px auto;">
    <h2 style="text-align: center; margin-bottom: 30px;">Регистрация</h2>
    <form method="post" id="signupForm">
        {% csrf_token %}
        <div class="form-group">
            <label>Имя пользователя</label>
            <input type="text" name="username" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
            <small style="color: var(--text-muted);">Должен быть уникальным</small>
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" name="phone" class="form-control" placeholder="+7 XXX XXX-XX-XX">
            <small style="color: var(--text-muted);">Должен быть уникальным</small>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Подтвердите пароль</label>
            <input type="password" name="password2" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
    </form>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', function(e) {
    const email = document.querySelector('[name="email"]').value;
    const phone = document.querySelector('[name="phone"]').value;
    const password = document.querySelector('[name="password"]').value;
    const password2 = document.querySelector('[name="password2"]').value;
    
    if (password !== password2) {
        e.preventDefault();
        alert('Пароли не совпадают');
        return false;
    }
    
    // Простая проверка формата телефона (опционально)
    if (phone && !phone.match(/^[\+\d][\d\s\-\(\)]{10,20}$/)) {
        e.preventDefault();
        alert('Введите корректный номер телефона');
        return false;
    }
});
</script>
{% endblock %}
